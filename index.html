<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARYA — Atelier &amp; Kuru Temizleme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Tüm CSS aynen korundu – buraya kopyalamak yerine kısaltıyorum, ama sen mevcut CSS'i olduğu gibi bırak */
    /* ... */
  </style>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- Tüm HTML yapısı aynen korundu – MODALLAR, SCREEN'LER vs. -->

<script>
(function () {
  'use strict';

  /* ICONS aynen */
  const IC = { /* ... */ };

  /* STATE aynen */
  const State = { /* ... */ };

  /* STORE aynen (Firebase yapılandırması aynı) */
  const Store = { /* ... */ };

  /* TOAST, VALIDATION, MODAL, AUTH, CALENDAR aynen */
  /* ... */

  /* BOOKING, STEP MANAGER aynen */
  /* ... */

  /* ************************************************************ */
  /* YENİ: VERCEL BLOB UPLOAD FONKSİYONU                         */
  /* ************************************************************ */
  async function uploadToVercelBlob(file) {
    const formData = new FormData();
    formData.append('file', file);

    const response = await fetch('/api/upload', {
      method: 'POST',
      body: formData,
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error || 'Yükleme başarısız');
    }

    const data = await response.json();
    return data.url; // public URL
  }

  /* ************************************************************ */
  /* ADMIN MODULE – ImgBB ile ilgili her şey kaldırıldı          */
  /* ************************************************************ */
  const Admin = {
    PAGE_SZ: 8,

    _setNav(page) { /* aynen */ },

    render(page) {
      this._setNav(page);
      const c = document.getElementById('adminContent');
      try {
        switch (page) {
          case 'dashboard':  c.innerHTML = this._dashboard();  break;
          case 'randevular': c.innerHTML = this._randevular(); this._bindSearch('randevular'); break;
          case 'hizmetler':  c.innerHTML = this._hizmetler();  break;
          case 'musteriler': c.innerHTML = this._musteriler(); break;
          case 'ayarlar':    c.innerHTML = this._ayarlar();    break; // ayarlar sayfası güncellendi (ImgBB yok)
        }
      } catch (e) {
        c.innerHTML = '<div class="empty-state"><p>İçerik yüklenemedi.</p></div>';
        console.error('[ARYA Admin] Render error:', e);
      }
    },

    _activePage() { /* aynen */ },

    _dashboard() { /* aynen */ },
    _statCard(lbl, icon, val, sub) { /* aynen */ },
    _apptRow(a) { /* aynen */ },
    _emptyRow(cols) { /* aynen */ },
    _randevular() { /* aynen */ },
    _bindSearch(page) { /* aynen */ },
    _hizmetler() { /* aynen (hizmet kartları aynı) */ },
    _musteriler() { /* aynen */ },

    /* ——— Ayarlar (ImgBB kısmı tamamen çıkarıldı) ——— */
    _ayarlar() {
      const fbConnected = Store.isFirebaseConnected();
      const fbCfgRaw    = localStorage.getItem('arya_firebase_config') || '';
      let fbProjectId   = '';
      try { fbProjectId = JSON.parse(fbCfgRaw).projectId || ''; } catch(e) {}

      return `
        <div class="page-hdr"><div class="page-title serif">Ayarlar</div></div>

        <!-- FIREBASE SETUP (aynen) -->
        <div class="settings-block" style="margin-bottom:14px; border-color:rgba(196,151,58,.4);">
          <h3 style="display:flex;align-items:center;gap:8px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" width="17" height="17"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Firebase Bulut Veritabani
          </h3>
          ${fbConnected
            ? '<div style="display:flex;align-items:center;gap:8px;background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.3);border-radius:10px;padding:11px 14px;margin:10px 0;font-size:13px;color:#4caf50;">&#10003; Firebase bagli — <strong>' + fbProjectId + '</strong> &nbsp;|&nbsp; Tum degisiklikler anlik herkese yansir.</div>'
            : '<div style="background:rgba(196,151,58,.07);border:1px solid rgba(196,151,58,.2);border-radius:10px;padding:12px 14px;margin:10px 0 14px;font-size:13px;color:var(--tx2);line-height:1.8;"><strong style=\"color:var(--gold-hi);\">Neden herkes goremez?</strong><br>Uygulama su an bu tarayicinin hafizasini (localStorage) kullaniyor. Telefon, baska bilgisayar bunlari goremez.<br><strong style=\"color:var(--tx1);\">Cozum:</strong> Ucretsiz Firebase ekle — bundan sonra admin panelinden yaptigin her degisiklik anlik olarak Vercel sitende herkese yansir.</div>'
          }
          <p style="font-size:11px;color:var(--tx3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1.2px;font-weight:600;">Firebase Config (JSON)</p>
          <textarea class="finput" id="fbConfigInput" rows="6"
            placeholder='{&#10;  "apiKey": "AIza...",&#10;  "authDomain": "proje.firebaseapp.com",&#10;  "projectId": "proje-adi",&#10;  "storageBucket": "proje.appspot.com",&#10;  "messagingSenderId": "1234...",&#10;  "appId": "1:1234..."&#10;}'
            style="font-family:monospace;font-size:11.5px;resize:vertical;">${fbCfgRaw}</textarea>
          <button class="btn btn-primary" id="btnSaveFbConfig" style="width:100%;justify-content:center;margin-top:10px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Firebase Baglantisini Kaydet &amp; Aktar
          </button>
          <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-top:14px;">
            <p style="font-size:12px;color:var(--tx2);font-weight:600;margin-bottom:8px;">Firebase nasil kurulur? (3 adim)</p>
            <div style="font-size:11.5px;color:var(--tx3);line-height:2;">
              <b style="color:var(--tx2);">1.</b> <a href="https://console.firebase.google.com" target="_blank" style="color:var(--gold);">console.firebase.google.com</a> &rarr; <b>Proje olustur</b><br>
              <b style="color:var(--tx2);">2.</b> Sol menu &rarr; <b>Firestore Database</b> &rarr; <b>Create database</b> &rarr; <b>Test mode</b><br>
              <b style="color:var(--tx2);">3.</b> Sol menu &rarr; <b>Proje Ayarlari (dis li)</b> &rarr; <b>Web uygulamasi ekle (&lt;/&gt;)</b> &rarr; Config JSON'u kopyala &rarr; buraya yapistir
            </div>
          </div>
        </div>

        <!-- LOGOUT (aynen) -->
        <div class="settings-block">
          <h3>Oturum</h3>
          <button class="btn btn-danger" id="btnLogout" style="margin-top:4px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Oturumu Kapat
          </button>
        </div>`;
    },

    /* ——— Diğer admin metodları (togglePayment, openReschedule, confirmReschedule, deleteService, whatsapp, logout) aynen ——— */
    togglePayment(id) { /* aynen */ },
    openReschedule(id) { /* aynen */ },
    confirmReschedule() { /* aynen */ },
    deleteService(id) { /* aynen */ },
    whatsapp(tel) { /* aynen */ },
    logout() { /* aynen */ },

    /* ——— Görsel yardımcıları aynen ——— */
    _setImgPreview(src) { /* aynen */ },
    _clearImgState() { /* aynen */ },

    openAdd() { /* aynen */ },
    openEdit(id) { /* aynen */ },

    /* ——— YENİ: saveService artık img değerini doğrudan hidden'dan alır ——— */
    saveService() {
      const ad    = document.getElementById('mhAd').value.trim();
      const fiyat = parseInt(document.getElementById('mhFiyat').value, 10);
      const sure  = document.getElementById('mhSure').value.trim();
      const img   = document.getElementById('mhImgData').value.trim()
                    || 'https://images.unsplash.com/photo-1591196703216-85c2b8ddb3b0?w=400&q=75';

      if (!ad || isNaN(fiyat) || fiyat < 0 || !sure) {
        Toast.err('Ad, fiyat ve süre alanları zorunludur.');
        return;
      }

      if (State.admin.pendingServiceId) {
        const s = State.services.find(s => s.id === State.admin.pendingServiceId);
        if (s) Object.assign(s, { ad, fiyat, sure, img });
      } else {
        const newId = (Math.max(0, ...State.services.map(s => s.id)) + 1);
        State.services.push({ id: newId, ad, fiyat, sure, img });
      }

      Store.save();
      Modal.close('modalHizmet');
      Toast.ok('Hizmet kaydedildi.');
      this.render('hizmetler');
      Booking.renderServices();
    },
  };

  /* ************************************************************ */
  /* HANDLE IMAGE FILE – VERCEL BLOB KULLANIMI                   */
  /* ************************************************************ */
  async function handleImageFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      Toast.err('Lütfen bir görsel dosyası seçin.');
      return;
    }
    if (file.size > 8 * 1024 * 1024) {
      Toast.err('Dosya 8 MB\'dan büyük olamaz.');
      return;
    }

    const zone = document.getElementById('mhUploadZone');
    const origHTML = zone.innerHTML;
    zone.innerHTML = '<div style="padding:8px;color:var(--gold);font-size:12px;text-align:center;">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" style="animation:spin 1s linear infinite;display:block;margin:0 auto 6px;">' +
      '<path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Yükleniyor...</div>';

    try {
      const url = await uploadToVercelBlob(file);
      zone.innerHTML = origHTML;
      Admin._setImgPreview(url);
      Toast.ok('Görsel Vercel Blob\'a yüklendi!');
    } catch (error) {
      zone.innerHTML = origHTML;
      console.error('Upload error:', error);
      Toast.err('Yükleme başarısız: ' + error.message);
    }
  }

  /* ************************************************************ */
  /* EVENT BINDING (güncellendi)                                 */
  /* ************************************************************ */
  function bindEvents() {
    // Switcher, login, booking, calendar, admin nav aynen...

    // Admin content event listener – ImgBB ile ilgili kısım kaldırıldı
    document.getElementById('adminContent').addEventListener('click', e => {
      const pay = e.target.closest('[data-aid]');
      if (pay) { Admin.togglePayment(pay.dataset.aid); return; }

      const wa = e.target.closest('[data-wa]');
      if (wa) { Admin.whatsapp(wa.dataset.wa); return; }

      const move = e.target.closest('[data-move]');
      if (move) { Admin.openReschedule(move.dataset.move); return; }

      const edit = e.target.closest('[data-edit]');
      if (edit) { Admin.openEdit(edit.dataset.edit); return; }

      const del = e.target.closest('[data-del]');
      if (del) { Admin.deleteService(del.dataset.del); return; }

      if (e.target.closest('#btnYeniHizmet')) { Admin.openAdd(); return; }

      const pg = e.target.closest('[data-pg]:not([disabled])');
      if (pg && !e.target.closest('button[disabled]')) {
        State.admin.page = +pg.dataset.pg;
        Admin.render('randevular');
        return;
      }

      // Firebase config kaydetme (aynen)
      if (e.target.closest('#btnSaveFbConfig')) {
        try {
          const cfg = JSON.parse(document.getElementById('fbConfigInput').value);
          localStorage.setItem(Store.K_FB_CFG, JSON.stringify(cfg));
          Toast.ok('Config kaydedildi. Sayfayı yenileyin.');
        } catch {
          Toast.err('Geçersiz JSON');
        }
        return;
      }

      // Logout
      if (e.target.closest('#btnLogout')) { Admin.logout(); return; }
    });

    // Reschedule modal
    document.getElementById('tasiConfirm').addEventListener('click', () => Admin.confirmReschedule());
    document.getElementById('tasiCancel').addEventListener('click',  () => Modal.close('modalTasi'));

    // Service modal
    document.getElementById('mhSave').addEventListener('click',   () => Admin.saveService());
    document.getElementById('mhCancel').addEventListener('click', () => Modal.close('modalHizmet'));

    // Image: file pick
    document.getElementById('mhFile').addEventListener('change', e => {
      handleImageFile(e.target.files[0]);
    });

    // Image: drag & drop
    const zone = document.getElementById('mhUploadZone');
    zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', ()  => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag');
      handleImageFile(e.dataTransfer.files[0]);
    });

    // Image: URL load button (artık ImgBB yok, sadece URL girme)
    document.getElementById('mhUrlLoad').addEventListener('click', () => {
      const url = document.getElementById('mhImgUrl').value.trim();
      if (!url) { Toast.err('Lütfen bir URL girin.'); return; }
      const tester = new Image();
      tester.onload  = () => Admin._setImgPreview(url);
      tester.onerror = () => Toast.err('URL\'den görsel yüklenemedi.');
      tester.src = url;
    });

    // Image: remove preview
    document.getElementById('mhImgRemove').addEventListener('click', () => Admin._clearImgState());

    // Modal close (aynen)
    document.querySelectorAll('.modal-bg').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay && overlay.id !== 'modalLogin') Modal.close(overlay.id);
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-bg.open').forEach(m => {
          if (m.id !== 'modalLogin') Modal.close(m.id);
        });
      }
    });
  }

  /* BOOT aynen */
  async function boot() {
    try {
      await Store.load();
      // Refresh images if needed...
      Booking.renderServices();
      Steps._render();
      bindEvents();
      console.info('%c ARYA Atelier OS v2.0 (Vercel Blob)', 'background:#c4973a;color:#07080f;font-weight:700;padding:4px 14px;border-radius:20px;font-size:13px;');
    } catch (e) {
      console.error('[ARYA] Boot failed:', e);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>

<!-- Eski script modülü kaldırıldı, artık gerek yok -->
</body>
</html>
